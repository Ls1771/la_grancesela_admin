<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit a Ticket - La Grancesela</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
  <main class="bg-white w-full max-w-xl rounded-xl shadow-lg border border-slate-200 p-8">
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Submit a Problem Ticket</h1>
    <p class="text-slate-600 mb-6">Use this form to report a booking, event, room, or website issue.</p>
    <form id="ticketForm" class="space-y-4">
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label><input id="requester_name" type="text" required class="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Email</label><input id="requester_email" type="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Phone</label><input id="requester_phone" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Problem Title</label><input id="ticket_title" type="text" required placeholder="Example: Unable to update booking date" class="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Priority</label><select id="ticket_priority" class="w-full border border-slate-300 rounded-lg px-3 py-2"><option value="Low">Low</option><option value="Medium" selected>Medium</option><option value="High">High</option><option value="Urgent">Urgent</option></select></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Description</label><textarea id="ticket_description" rows="5" required placeholder="Describe the issue..." class="w-full border border-slate-300 rounded-lg px-3 py-2"></textarea></div>
      <button type="submit" class="w-full bg-black text-white rounded-lg py-3 font-semibold hover:bg-slate-800">Submit Ticket</button>
    </form>
    <p id="message" class="mt-4 text-sm font-medium"></p>
  </main>
  <script>
    const form = document.getElementById("ticketForm");
    const message = document.getElementById("message");
    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      const ticketData = {
        requester_name: requester_name.value,
        requester_email: requester_email.value,
        requester_phone: requester_phone.value,
        ticket_title: ticket_title.value,
        ticket_priority: ticket_priority.value,
        ticket_description: ticket_description.value
      };
      try {
        const response = await fetch("http://localhost:3000/api/public/tickets", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(ticketData)
        });
        const data = await response.json();
        if (!response.ok) {
          message.textContent = data.message || "Ticket submission failed.";
          message.className = "mt-4 text-sm font-medium text-red-600";
          return;
        }
        message.textContent = "Ticket submitted successfully.";
        message.className = "mt-4 text-sm font-medium text-green-600";
        form.reset();
      } catch (error) {
        message.textContent = "Could not connect to the server.";
        message.className = "mt-4 text-sm font-medium text-red-600";
      }
    });
  </script>
</body>
</html>
