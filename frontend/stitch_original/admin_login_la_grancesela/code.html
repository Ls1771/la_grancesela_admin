<!DOCTYPE html>

                    },
                    "borderRadius": {

                    },
                    "spacing": {
                        "section-padding": "2rem",
                        "sidebar-width": "260px",
                        "gutter": "1.5rem",
                        "container-max-width": "1440px",
                        "card-gap": "1rem"
                    },
                    "fontFamily": {

                        "body-md": ["Inter"],

<body class="font-body-md text-body-md text-on-surface antialiased bg-background selection:bg-secondary/20 selection:text-secondary">
<!-- Screen Wrapper -->
<div class="relative min-h-screen w-full flex items-center justify-center p-4 sm:p-section-padding">
<!-- Background Image with Soft Overlay -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="A subtle, high-quality photograph of a luxurious boutique hotel lobby. The scene features elegant minimalist furniture, soft ambient lighting, and neutral tones. The atmosphere is calm, sophisticated, and modern, reflecting a premium corporate aesthetic. The focus is slightly blurred to serve as a perfect, non-distracting background for an administrative interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA4neDPUotjteL66ArGeHyg1N4nyYe-Me7fc1k_tHaskPsT4_JEBUFe4zp5FAkOkKjtbgM8-iDHVpg-Kw8mMMDhXkXcItLO1R-DW1WScCmFS4ogMVkEa_vxGkLnSf4UaZJfE3AqWgiqK4I9s5yuxMxkWz593RjGTOHWFHAEwuYZE_ooFgJPK2XOW9TT2p99Rvp6_Es5v3kvxAKbTjZYaAXdIyW4oF0BzSsvTcyRKKVTeyQ1HEOyf3QeImKshx52N0vpq-w-iCeufa8M');">
<!-- Tonal overlay to ensure card legibility and match brand color scheme -->
<div class="absolute inset-0 bg-surface/80 backdrop-blur-[2px]"></div>
</div>
<!-- Login Card -->
<main class="relative z-10 w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-outline-variant/30 flex flex-col overflow-hidden">
<!-- Top Accent Line -->
<div class="h-1 w-full bg-primary"></div>
<div class="p-8 sm:p-10 flex flex-col">
<!-- Header / Brand -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight mb-2">La Grancesela</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Boutique Management Portal</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant/70">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-secondary focus:ring-4 focus:ring-secondary/10 transition-all duration-200" id="email" name="email" placeholder="admin@lagrancesela.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant/70">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-secondary focus:ring-4 focus:ring-secondary/10 transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-1">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-secondary/20 focus:ring-offset-0 bg-surface-container-lowest cursor-pointer transition-colors" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember-me">
                                Remember Me
                            </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-secondary hover:text-secondary-container hover:underline underline-offset-4 transition-colors" href="#">
                                Forgot Password?
                            </a>
</div>
</div>
<!-- Submit Action -->
<button class="mt-4 w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-inverse-surface focus:outline-none focus:ring-4 focus:ring-primary/20 transition-all duration-200" type="submit">
                        Log In
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer Info -->
<div class="mt-8 text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/70">
                        Secure Access via La Grancesela Admin Protocol.
                    </p>
</div>
</div>
</main>
</div>
</body></html>
